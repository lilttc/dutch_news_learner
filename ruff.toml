line-length = 100

[lint]
# E402: scripts use sys.path.insert() before imports - unavoidable pattern
# E712: SQLAlchemy filters use == True / == False / == None for SQL semantics
# Lines that genuinely cannot be shortened (LLM prompt strings, SQL DDL,
# JS/CSS inside f-strings) are marked with # noqa: E501 inline.
ignore = ["E712"]

[lint.per-file-ignores]
"scripts/*.py" = ["E402"]
"app/main.py" = ["E402"]
"src/api/main.py" = ["E402"]
